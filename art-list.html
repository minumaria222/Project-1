<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gallery - ArtGallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">ArtGallery</a>
      </div>
    </nav>

    <main class="container my-5">
      <h2 class="mb-4">All Artworks</h2>
      <div class="row g-4">
        <!-- Repeat these cards for entries -->
        <div class="col-md-4">
          <div class="card hover-grow">
            <img src="https://picsum.photos/id/1011/800/600" class="card-img-top" alt="Sunset Reverie">
            <div class="card-body">
              <h5 class="card-title">Sunset Reverie</h5>
              <p class="card-text">by Clara M.</p>
              <a href="art1.html" class="btn btn-outline-primary">View</a>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card hover-grow">
            <img src="https://picsum.photos/id/1027/800/600" class="card-img-top" alt="Ocean Whispers">
            <div class="card-body">
              <h5 class="card-title">Ocean Whispers</h5>
              <p class="card-text">by Marco R.</p>
              <a href="art2.html" class="btn btn-outline-primary">View</a>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card hover-grow">
            <img src="https://picsum.photos/id/1035/800/600" class="card-img-top" alt="City Lines">
            <div class="card-body">
              <h5 class="card-title">City Lines</h5>
              <p class="card-text">by Ayumi K.</p>
              <a href="art3.html" class="btn btn-outline-primary">View</a>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card hover-grow">
            <img src="https://picsum.photos/id/1043/800/600" class="card-img-top" alt="Forest Song">
            <div class="card-body">
              <h5 class="card-title">Forest Song</h5>
              <p class="card-text">by Lina P.</p>
              <a href="art4.html" class="btn btn-outline-primary">View</a>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card hover-grow">
            <img src="https://picsum.photos/id/1050/800/600" class="card-img-top" alt="Abstract Bloom">
            <div class="card-body">
              <h5 class="card-title">Abstract Bloom</h5>
              <p class="card-text">by Theo S.</p>
              <a href="art5.html" class="btn btn-outline-primary">View</a>
            </div>
          </div>
        </div>

      </div>
    </main>

    <footer class="py-4 bg-dark text-white text-center">
      <div class="container">© 2026 ArtGallery</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
