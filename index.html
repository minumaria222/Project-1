<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gallery Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">ArtGallery</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="art-list.html">Browse</a></li>
            <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
            <li class="nav-item"><a class="nav-link" href="signup.html">Sign Up</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <header class="py-5 text-center bg-light hero">
      <div class="container">
        <h1 class="display-5">Welcome to ArtGallery</h1>
        <p class="lead">Discover curated artworks and artist stories.</p>
        <a class="btn btn-primary btn-lg" href="art-list.html">Explore Gallery</a>
      </div>
    </header>

    <main class="container my-5">
      <h2 class="mb-4">Featured Works</h2>
      <div class="row g-4">
        <div class="col-md-4">
          <div class="card hover-grow">
            <img src="https://picsum.photos/id/1011/800/600" class="card-img-top" alt="Art 1">
            <div class="card-body">
              <h5 class="card-title">Sunset Reverie</h5>
              <p class="card-text">by Clara M.</p>
              <a href="art1.html" class="stretched-link"></a>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card hover-grow">
            <img src="https://picsum.photos/id/1027/800/600" class="card-img-top" alt="Art 2">
            <div class="card-body">
              <h5 class="card-title">Ocean Whispers</h5>
              <p class="card-text">by Marco R.</p>
              <a href="art2.html" class="stretched-link"></a>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card hover-grow">
            <img src="https://picsum.photos/id/1035/800/600" class="card-img-top" alt="Art 3">
            <div class="card-body">
              <h5 class="card-title">City Lines</h5>
              <p class="card-text">by Ayumi K.</p>
              <a href="art3.html" class="stretched-link"></a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="py-4 bg-dark text-white text-center">
      <div class="container">© 2026 ArtGallery</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
